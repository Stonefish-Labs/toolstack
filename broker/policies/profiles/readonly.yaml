profile: readonly

allowed_tools:
  - calendar
  - hello-rest
  - time-mcp

denied_tools:
  - admin

allowed_ops:
  - "*.get_*"
  - "*.list_*"
  - "*.read_*"
  - "*.fetch_*"
  - "*.show_*"
  - "hello-rest.greet"
  - "time-mcp.current_time"
  - "time-mcp.time_in"

risk_class_default:
  read: allow
  write: deny
  destructive: deny

auto_grant_ttl_seconds: 7200
