profile: home-default

allowed_tools:
  - calendar
  - hello-rest
  - time-mcp

denied_tools:
  - admin

allowed_ops:
  - "calendar.get_*"
  - "calendar.list_*"
  - "hello-rest.greet"
  - "time-mcp.current_time"
  - "time-mcp.time_in"

review_ops:
  - "calendar.create_*"

denied_ops:
  - "*.delete_*"
  - "*.destroy_*"

risk_class_default:
  read: allow
  write: review
  destructive: deny

auto_grant_ttl_seconds: 3600
